<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Details - BrokieFlix</title>
  <style>
    body {
      margin: 0;
      background: #0b0c10;
      color: white;
      font-family: 'Segoe UI', sans-serif;
      line-height: 1.6;
    }

    .backdrop {
      width: 100%;
      height: 400px;
      background-size: cover;
      background-position: center;
      position: relative;
    }

    .overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      background: linear-gradient(to top, #0b0c10 30%, transparent 100%);
    }

    .content {
      display: flex;
      flex-wrap: wrap;
      padding: 40px 5vw;
      max-width: 1200px;
      margin: auto;
    }

    .poster {
      width: 260px;
      border-radius: 10px;
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.7);
      margin-right: 30px;
      max-width: 100%;
    }

    .info {
      flex: 1;
      min-width: 300px;
    }

    .title {
      font-size: 2.4rem;
      margin-bottom: 10px;
    }

    .meta,
    .overview {
      color: #ccc;
      margin-bottom: 20px;
    }

    .genres {
      margin-bottom: 15px;
    }

    .genre-tag {
      background: #1e88e5;
      padding: 6px 10px;
      border-radius: 6px;
      margin-right: 8px;
      font-size: 0.85rem;
    }

    .play-btn {
      background: #1e88e5;
      color: white;
      font-size: 1.1rem;
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .cast {
      max-width: 1200px;
      margin: 40px auto;
      padding: 0 5vw;
    }

    .cast h2 {
      margin-bottom: 20px;
      font-size: 1.5rem;
    }

    .cast-wrapper {
      position: relative;
      overflow: hidden;
    }

    .cast-grid {
      display: flex;
      gap: 20px;
      overflow-x: auto;
      padding: 10px 0;
      scroll-behavior: smooth;
      scrollbar-width: none;
    }

    .cast-grid::-webkit-scrollbar {
      display: none;
    }

    .arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: #1e88e5;
      color: white;
      border: none;
      font-size: 1.5rem;
      width: 35px;
      height: 35px;
      border-radius: 50%;
      z-index: 2;
      cursor: pointer;
    }

    .arrow.left {
      left: 0;
    }

    .arrow.right {
      right: 0;
    }

    .actor {
      min-width: 120px;
      text-align: center;
      cursor: pointer;
    }

    .actor img {
      width: 100%;
      border-radius: 8px;
      height: 160px;
      object-fit: cover;
      margin-bottom: 5px;
    }

    .actor-name {
      font-size: 0.9rem;
    }

    .character {
      font-size: 0.8rem;
      color: #aaa;
    }

    @media (max-width: 600px) {
      .content {
        flex-direction: column;
        align-items: center;
      }

      .poster {
        margin-right: 0;
        margin-bottom: 20px;
      }

      .title {
        font-size: 2rem;
        text-align: center;
      }
    }
  </style>
</head>

<body>

  <div class="backdrop" id="backdrop">
    <div class="overlay"></div>
  </div>

  <div class="content">
    <img class="poster" id="poster" src="" alt="Poster">
    <div class="info">
      <div class="title" id="title">Loading...</div>
      <div class="meta" id="meta"></div>
      <div class="genres" id="genres"></div>
      <div class="overview" id="overview"></div>
      <button class="play-btn" id="playBtn">▶ Play</button>
    </div>
  </div>

  <div class="cast">
    <h2>Cast</h2>
    <div class="cast-wrapper">
      <button class="arrow left" onclick="scrollCast(-1)">&#10094;</button>
      <div class="cast-grid" id="castGrid"></div>
      <button class="arrow right" onclick="scrollCast(1)">&#10095;</button>
    </div>
  </div>

  <script>
    const apiKey = '71ff6bb5a8e8de46c14f778b39dba9e9';
    const q = new URLSearchParams(window.location.search);
    const id = q.get("id");
    const type = q.get("type");

    if (!id || !type) {
      document.body.innerHTML = "<p>Missing parameters.</p>";
    } else {
      fetch(`https://api.themoviedb.org/3/${type}/${id}?api_key=${apiKey}`)
        .then(res => res.json())
        .then(data => {
          document.getElementById("title").textContent = data.title || data.name;
          document.getElementById("poster").src = `https://image.tmdb.org/t/p/w500${data.poster_path}`;
          document.getElementById("backdrop").style.backgroundImage = `url(https://image.tmdb.org/t/p/original${data.backdrop_path})`;
          document.getElementById("overview").textContent = data.overview || "No overview available.";
          document.getElementById("meta").textContent = `${(data.release_date || data.first_air_date || 'N/A').slice(0, 4)} • ⭐ ${data.vote_average || "?"} • ${data.runtime || data.episode_run_time?.[0] || "?"} min`;
          document.getElementById("genres").innerHTML = data.genres.map(g => `<span class="genre-tag">${g.name}</span>`).join("");

          document.getElementById("playBtn").onclick = () => {
            const url = type === "movie"
              ? `episode.html?tmbid=${id}&type=movie`
              : `player.html?type=tv&id=${id}`;
            window.location.href = url;
          };
        });

      fetch(`https://api.themoviedb.org/3/${type}/${id}/credits?api_key=${apiKey}`)
        .then(res => res.json())
        .then(data => {
          const cast = data.cast.slice(0, 12);
          const castGrid = document.getElementById("castGrid");
          cast.forEach(actor => {
            const div = document.createElement("div");
            div.className = "actor";
            div.innerHTML = `
              <img src="https://image.tmdb.org/t/p/w185${actor.profile_path || ''}" alt="${actor.name}" onerror="this.style.display='none'">
              <div class="actor-name">${actor.name}</div>
              <div class="character">${actor.character}</div>
            `;
            div.onclick = () => {
              window.location.href = `person.html?person=${actor.id}`;
            };
            castGrid.appendChild(div);
          });
        });
    }

    function scrollCast(direction) {
      const container = document.getElementById("castGrid");
      const scrollAmount = direction * 250;
      container.scrollBy({left: scrollAmount, behavior: "smooth"});
    }
  </script>

</body>

</html>
