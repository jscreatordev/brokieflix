<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Actor - BrokieFlix</title>
  <style>
    body {
      background: #0b0c10;
      color: white;
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 20px;
      text-align: center;
    }

    .profile {
      display: flex;
      flex-wrap: wrap;
      gap: 30px;
      justify-content: center;
      align-items: flex-start;
      margin-bottom: 40px;
    }

    .profile img {
      width: 240px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.6);
    }

    .details {
      max-width: 600px;
      text-align: left;
    }

    .details h1 {
      font-size: 2.4rem;
      margin-bottom: 10px;
    }

    .bio {
      color: #ccc;
      font-size: 1rem;
    }

    .section {
      max-width: 1200px;
      margin: 0 auto 50px;
      text-align: left;
    }

    .section h2 {
      margin: 20px 0 10px;
    }

    .grid {
      display: grid;
      gap: 20px;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    }

    .card {
      background: #1a1c20;
      border-radius: 10px;
      overflow: hidden;
      text-align: center;
      transition: transform 0.2s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card img {
      width: 100%;
      height: 210px;
      object-fit: cover;
    }

    .card-title {
      padding: 10px;
      font-size: 0.95rem;
      min-height: 50px;
    }

    .play-btn {
      background: #1e88e5;
      color: white;
      border: none;
      padding: 6px 12px;
      margin-bottom: 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
    }

    @media (max-width: 600px) {
      .profile {
        flex-direction: column;
        align-items: center;
      }

      .details {
        text-align: center;
      }
    }
  </style>
</head>

<body>
  <div class="profile">
    <img id="profileImg" src="" alt="Actor Image" />
    <div class="details">
      <h1 id="name">Loading...</h1>
      <p class="bio" id="bio"></p>
    </div>
  </div>

  <div class="section">
    <h2>Movies</h2>
    <div class="grid" id="movieGrid"></div>
  </div>

  <div class="section">
    <h2>TV Shows</h2>
    <div class="grid" id="tvGrid"></div>
  </div>

  <script>
    const apiKey = '71ff6bb5a8e8de46c14f778b39dba9e9';
    const personId = new URLSearchParams(window.location.search).get("person");

    if (!personId) {
      document.body.innerHTML = "<p>Missing person ID.</p>";
    } else {
      // Actor bio info
      fetch(`https://api.themoviedb.org/3/person/${personId}?api_key=${apiKey}`)
        .then(res => res.json())
        .then(data => {
          document.getElementById("name").textContent = data.name;
          document.getElementById("profileImg").src = `https://image.tmdb.org/t/p/w500${data.profile_path}`;
          document.getElementById("bio").textContent = data.biography || "No biography available.";
        });

      // Credits
      fetch(`https://api.themoviedb.org/3/person/${personId}/combined_credits?api_key=${apiKey}`)
        .then(res => res.json())
        .then(data => {
          const movies = data.cast.filter(c => c.media_type === "movie" && c.poster_path);
          const tv = data.cast.filter(c => c.media_type === "tv" && c.poster_path);

          const movieGrid = document.getElementById("movieGrid");
          const tvGrid = document.getElementById("tvGrid");

          movies.forEach(m => {
            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `
              <img src="https://image.tmdb.org/t/p/w300${m.poster_path}" alt="${m.title}">
              <div class="card-title">${m.title}</div>
              <button class="play-btn" onclick="location.href='info.html?type=movie&id=${m.id}'">▶ Play</button>
            `;
            movieGrid.appendChild(card);
          });

          tv.forEach(s => {
            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `
              <img src="https://image.tmdb.org/t/p/w300${s.poster_path}" alt="${s.name}">
              <div class="card-title">${s.name}</div>
              <button class="play-btn" onclick="location.href='info.html?type=tv&id=${s.id}'">▶ Play</button>
            `;
            tvGrid.appendChild(card);
          });
        });
    }
  </script>
</body>

</html>
